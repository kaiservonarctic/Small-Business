  "foundations": {
    "heading": "Small Business Contracting Foundations",
    "subtitle": "Core concepts every small business and federal professional needs to understand before diving into specific programs and regulations.",
    "intro": {
      "title": "Why Small Business Matters in Federal Procurement",
      "body": "The Small Business Act (15 U.S.C. § 631 et seq.) establishes that the federal government should award a \"fair proportion\" of contracts to small businesses. This statutory mandate drives the entire framework of set-asides, goals, and socioeconomic programs. The government-wide goal is 23% of prime contract dollars to small businesses, with additional subcategory goals for specific socioeconomic groups."
    },
    "topics": [
      {
        "title": "The Rule of Two",
        "paragraphs": [
          "The Rule of Two is the single most important protection for small businesses in federal contracting. It requires contracting officers to set aside acquisitions for small businesses when they have a reasonable expectation that at least two responsible small business concerns will submit offers at fair market prices.",
          "**Statutory vs. Regulatory:** Between the micro-purchase threshold and simplified acquisition threshold (SAT), the Rule of Two is *statutory* — Congress requires it. Above the SAT, it has been *regulatory* — the FAR Council chose to keep it. The September 2025 FAR Part 19 overhaul retained the Rule of Two above the SAT, calling it \"essential to sound procurement.\"",
          "**Key change (2025):** The Rule of Two no longer applies to task/delivery orders under multiple-award contracts. Contracting officers have discretion at the order level, and that discretionary decision cannot be protested."
        ]
      },
      {
        "title": "Size Standards & NAICS Codes",
        "paragraphs": [
          "SBA assigns a size standard to every North American Industry Classification System (NAICS) code. These standards define the maximum revenue or employee count a business can have and still be considered \"small\" for a given type of work. Size standards vary widely — from $9 million in some service industries to over $47 million in facilities support and $1 billion+ in some manufacturing sectors.",
          "The NAICS code assigned to a solicitation determines which size standard applies. Businesses must self-certify as small relative to the applicable standard. Misrepresentation of small business status is a federal offense subject to penalties under the False Claims Act."
        ]
      },
      {
        "title": "Set-Asides vs. Sole-Source Awards",
        "paragraphs": [
          "**Set-Aside:** A competitive procurement restricted to a particular category of small business. All eligible firms in the designated category can compete. Competitive set-asides fall under full and open competition after exclusion of sources (FAR 6.102), not other than full and open competition (FAR 6.103) — a distinction that affects presolicitation notice requirements.",
          "**Sole-Source:** A non-competitive award to a single firm, authorized under specific statutory authority (most commonly through the 8(a) program). Sole-source awards have dollar thresholds that were adjusted in October 2025 — the competitive threshold for 8(a) rose to $8.5M for manufacturing and $5.5M for other industries.",
          "Under the 2025 FAR overhaul, contracting officers must first attempt a competitive 8(a) acquisition using government-wide vehicles before turning to sole-source, even below the competitive threshold."
        ]
      },
      {
        "title": "Prime Contracting vs. Subcontracting",
        "paragraphs": [
          "Federal small business participation happens at two levels: prime contracting (direct awards from the government) and subcontracting (awards from prime contractors to smaller firms). Both count toward agency small business goals, though they're tracked differently.",
          "Large businesses receiving contracts above the simplified acquisition threshold must submit subcontracting plans with goals for small business participation. These plans are enforced through the FAR 52.219-9 clause. The limitation on subcontracting (FAR 52.219-14) frames the restriction as a prohibition on paying more than 50% to non-similarly-situated subcontractors — not a self-performance requirement."
        ]
      },
      {
        "title": "The SBA Procurement Scorecard",
        "paragraphs": [
          "Each fiscal year, SBA evaluates the 24 CFO Act agencies against their negotiated small business contracting goals. Agencies are graded A+ (≥120% of goal) through F (<70%). The scorecard covers prime and subcontracting goals across five categories: overall small business, SDB, WOSB, SDVOSB, and HUBZone.",
          "For FY2025, all government-wide prime goals are set at their statutory floors: 23% small business, 5% SDB, 5% WOSB, 5% SDVOSB, and 3% HUBZone. The SDB goal returned to 5% after the Trump Administration rescinded EO 14091, which had incrementally raised it toward 15%."
        ]
      },
      {
        "title": "Key Acquisition Thresholds (Effective Oct 1, 2025)",

          { "label": "Micro-Purchase Threshold (MPT)", "value": "$15,000" },
          { "label": "Simplified Acquisition Threshold (SAT)", "value": "$250,000" },
          { "label": "8(a) Competitive Threshold (Manufacturing)", "value": "$8.5 Million" },
          { "label": "8(a) Competitive Threshold (All Other)", "value": "$5.5 Million" },
          { "label": "8(a) Sole-Source Limit (Manufacturing)", "value": "$8.5 Million" },

    "heading": "Statutes & Regulations",
    "subtitle": "A map of the principal legal authorities governing small business contracting in the federal government — where the rules come from, who administers them, and how they interact.",
    "intro": {
      "title": "The Regulatory Architecture",
      "body": "Small business contracting rules come from multiple layers of authority: statutes enacted by Congress, regulations promulgated by agencies (principally SBA and the FAR Council), executive orders, and agency-specific supplements. Understanding which layer a particular rule comes from tells you how durable it is and who has the power to change it."
    },
    "topics": [
      {
        "title": "The Small Business Act (15 U.S.C. §§ 631–657s)",
        "paragraphs": [
          "The foundation of everything. Enacted in 1953 (P.L. 83-163), the Small Business Act created the SBA, established the policy that small businesses should receive a \"fair proportion\" of federal contracts, and authorized the programs that implement that policy. As amended through P.L. 119-74 (January 2026), the Act provides statutory authority for the 8(a) program (§ 637(a)), HUBZone (§ 657a), SDVOSB (§ 657f), WOSB (§ 637(m)), size standards (§ 632), and the government-wide contracting goals (§ 644(g)).",
          "The Act also requires each agency with procurement powers to establish an Office of Small and Disadvantaged Business Utilization (OSDBU), whose director reports directly to the agency head (§ 644(k)). The OSDBU is responsible for ensuring small business concerns are treated fairly in the acquisition process.",
          "**Why this matters:** When a rule is in the statute, it takes an act of Congress to change it. The Rule of Two between the MPT and SAT, the 23% overall small business goal, and the existence of the socioeconomic programs are all statutory — no executive order or FAR revision can eliminate them."
        ]
      },
      {
        "title": "SBA Regulations (13 C.F.R. Parts 121–134)",
        "paragraphs": [
          "SBA implements the Small Business Act through its regulations in Title 13 of the Code of Federal Regulations. The key parts for contracting professionals:",
          "**Part 121** — Size standards and size determination procedures. Defines how SBA calculates business size (revenue, employees) and the process for size protests and appeals.",
          "**Part 124** — 8(a) Business Development Program. Eligibility, application, annual reviews, program terms, sole-source and competitive thresholds, joint ventures, and the mentor-protégé program as it applies to 8(a) participants.",
          "**Part 125** — Government contracting programs. Covers the Rule of Two, small business set-aside procedures, subcontracting requirements, limitations on subcontracting, the certificate of competency (COC) process, and SDVOSB program rules.",
          "**Part 126** — HUBZone program rules.",
          "**Part 127** — WOSB/EDWOSB program rules.",
          "**Part 128** — SDVOSB/VOSB certification (VetCert) program, transferred from VA to SBA.",
          "**Part 134** — Rules of practice before the SBA Office of Hearings and Appeals (OHA), which handles size, status, and 8(a) program appeals.",
          "**Something to consider:** SBA regulations and FAR provisions sometimes conflict, particularly after the September 2025 FAR Part 19 overhaul. Where there is a conflict, the statute controls — but the practical answer at the contracting officer's desk often depends on which agency's deviation has been adopted."
        ]
      },
      {
        "title": "The Federal Acquisition Regulation (FAR)",
        "paragraphs": [
          "The FAR is the primary regulation governing federal procurement, jointly issued by the Department of Defense, General Services Administration, and NASA through the FAR Council under the authority of the Office of Federal Procurement Policy (OFPP). It is codified at 48 C.F.R. Chapter 1.",
          "**FAR Part 19** is the central part governing small business contracting (covered in detail in the FAR Provisions section of this guide), but small-business-relevant provisions appear throughout the FAR — in Parts 2, 5, 6, 7, 8, 15, 16, and 52 among others.",
          "The FAR is regulatory, not statutory. The FAR Council can revise it through rulemaking (formal notice-and-comment under the Administrative Procedure Act) or, as with the current Revolutionary FAR Overhaul (RFO), through interim class deviations that agencies adopt individually. This distinction matters because class deviations can be implemented faster but have less legal permanence than formal rules."
        ]
      },
      {
        "title": "Agency FAR Supplements (DFARS, GSAM, DEAR, etc.)",
        "paragraphs": [
          "Most large federal agencies issue their own supplements to the FAR that add agency-specific rules. For small business contracting, the most relevant supplements include:",
          "**DFARS** (48 C.F.R. Chapter 2) — Defense Federal Acquisition Regulation Supplement. DoD-specific small business provisions, including the comprehensive subcontracting plan test program and DoD mentor-protégé program.",
          "**GSAM** (48 C.F.R. Chapter 5) — General Services Administration Acquisition Manual. Includes GSA-specific implementation of small business programs on GSA Schedule (MAS) contracts.",
          "**DEAR** (48 C.F.R. Chapter 9) — Department of Energy Acquisition Regulation. DOE-specific provisions including those related to management and operating (M&O) contracts and small business subcontracting at DOE facilities.",
          "Agency supplements cannot conflict with the FAR but can add requirements. When a small business is working within a particular agency's contracting environment, knowing the relevant supplement is essential."
        ]
      },
      {
        "title": "The Competition in Contracting Act (CICA)",
        "paragraphs": [
          "CICA (41 U.S.C. §§ 3301–3308, and 10 U.S.C. § 3201 et seq. for defense) requires \"full and open competition\" in federal procurement, with defined exceptions. Small business set-asides are authorized under one of these exceptions — competition after exclusion of sources (41 U.S.C. § 3303; FAR 6.102).",
          "Understanding CICA's framework helps clarify how set-asides fit into the broader competition structure. A small business set-aside is not an exception to competition — it is a form of competition among a defined pool of eligible firms."
        ]
      },
      {
        "title": "Executive Orders & Policy Directives",
        "paragraphs": [
          "Presidents can shape small business contracting through executive orders and OMB memoranda, though these cannot override statute. Recent examples:",
          "**EO 14091 (Biden, 2023):** Raised the SDB contracting goal toward 15%. Rescinded by the Trump Administration, returning the goal to the statutory 5%.",
          "**EO 13985 (Biden, 2021):** Directed agencies to advance equity in procurement. Rescinded.",
          "**OMB Memoranda:** Annual goaling guidance from OMB sets the expectations for agency negotiations with SBA. These memoranda carry significant practical weight in how agencies prioritize small business categories.",
          "**Why this matters:** Executive actions can raise goals, create new reporting requirements, or shift emphasis among programs — but they can also be reversed by the next administration. Statutory provisions are far more durable."
        ]
      },
      {
        "title": "How the Layers Interact",
        "paragraphs": [
          "In practice, contracting officers navigate all these layers simultaneously. The hierarchy is: **statute → regulation (SBA regs and FAR) → agency supplement → class deviation → executive policy**. When conflicts arise, higher-authority sources control.",
          "The current environment is unusually complex because the FAR Part 19 overhaul introduced provisions through class deviations that, in some cases, conflict with still-operative SBA regulations. Contracting officers and small businesses both need to track which authority applies in a given agency and a given procurement."
        ]
      }
    ]
  },

      {
        "title": "Rule of Two Preserved",
        "body": "The Rule of Two survived — retained above the SAT as \"essential to sound procurement.\" However, it now applies to **all small businesses first**, before socioeconomic categories. Contracting officers must consider an overall SB set-aside before moving to a specific program."

    "details": [
      {
        "title": "Multiple-Award Contracts: Discretion, Not Mandate",
        "paragraphs": [
          "The Rule of Two no longer applies at the task/delivery order level under multiple-award contracts (MACs). Instead, contracting officers have discretionary authority to decide whether to set aside an order. This discretionary decision cannot serve as the basis for a bid protest.",
          "This is a significant change — task and delivery orders represent a large and growing share of federal spending. Small businesses lose mandatory set-aside protection on this portion of the contracting landscape."
        ]
      },
      {
        "title": "8(a) Program Changes in FAR Part 19",
        "paragraphs": [
          "**Competition before sole-source:** Contracting officers must first attempt competitive 8(a) acquisitions using GWACs before pursuing sole-source awards, even below the competitive threshold.",
          "**End of \"Once 8(a), Always 8(a)\":** Follow-on requirements can be automatically released from the 8(a) program to be set aside for HUBZone, SDVOSB, or WOSB programs — without SBA approval or written notification to SBA. This is a major departure from longstanding practice.",
          "**Potential tension:** Some of these FAR provisions may conflict with existing SBA regulations at 13 C.F.R. § 124.503(d)(1). SBA regulatory updates are still pending to reconcile inconsistencies."
        ]
      },
      {
        "title": "Recertification Changes",
        "paragraphs": [
          "Size and status will now be locked in at the contract level. The requirement for small businesses to re-represent their size at the task order level has been eliminated. Recertification is triggered only by contract-level events like option exercise, novation, or acquisition.",
          "This may benefit small business incumbents but could limit opportunities for new small businesses to challenge incumbents' size at the order level. Note that SBA regulations at 13 C.F.R. §§ 125.12 and 121.404 still permit order-level recertification, creating a regulatory inconsistency agencies will need to navigate."
        ]
      },

        "title": "Removed Provisions Worth Noting",
        "paragraphs": [
          "The overhaul removed several provisions that previously supported small business participation:",

        ]
      },
      {
        "title": "Relevant Provisions in Other FAR Parts",
        "paragraphs": [
          "Small business provisions are not confined to Part 19. Key provisions elsewhere in the FAR include:",
          "**Part 2 (Definitions):** Defines \"small business concern\" (2.101) by reference to SBA's size standards. Understanding this definition is foundational — it determines eligibility for every program and set-aside.",

        ]

    "topics": [
      {
        "title": "Origins: The Small Business Act of 1953",
        "paragraphs": [
          "The story begins in the aftermath of World War II and the Korean War. The federal government had relied heavily on large industrial firms for wartime production, and concerns grew that small businesses were being squeezed out of the procurement system. The Reconstruction Finance Corporation (RFC) had attempted to support small businesses but became mired in corruption allegations.",
          "On July 30, 1953, President Eisenhower signed the Small Business Act (P.L. 83-163), creating the SBA as an independent agency with a mission to \"aid, counsel, assist and protect\" small businesses. The Act was originally conceived as temporary, but the 1958 Amendments made SBA permanent and codified the Act as standalone legislation.",
          "The Act's declaration of policy remains the bedrock: the preservation of free competitive enterprise requires that small businesses receive a \"fair proportion\" of government contracts. This language has driven every subsequent expansion of the small business contracting framework."
        ]
      },
      {
        "title": "The 8(a) Program and the Era of Social Policy (1960s–1980s)",
        "paragraphs": [
          "Section 8(a) of the Small Business Act, originally a general procurement assistance provision, was pressed into service as a tool for addressing racial inequality following the civil unrest of the 1960s. In 1968, the SBA first used its 8(a) authority under President Johnson's Test Cities Program to channel contracts to minority-owned businesses.",
          "The 1978 amendments (P.L. 95-507) were transformative: they codified the 8(a) program with explicit statutory authority, required agencies to establish subcontracting goals for small businesses, and mandated the creation of Offices of Small and Disadvantaged Business Utilization (OSDBUs) at each agency.",

// ─── Markdown-lite renderer: handles **bold** and *italic* ───
function Md({ text }) {
  if (!text) return null;
  const parts = [];
  let remaining = text;
  let key = 0;
  const regex = /(\*\*(.+?)\*\*|\*(.+?)\*)/g;
  let lastIndex = 0;
  let match;
  while ((match = regex.exec(text)) !== null) {
    if (match.index > lastIndex) parts.push(<span key={key++}>{text.slice(lastIndex, match.index)}</span>);
    if (match[2]) parts.push(<strong key={key++} style={{ color: COLORS.gold }}>{match[2]}</strong>);
    else if (match[3]) parts.push(<em key={key++}>{match[3]}</em>);
    lastIndex = regex.lastIndex;
  }
  if (lastIndex < text.length) parts.push(<span key={key++}>{text.slice(lastIndex)}</span>);
  return <>{parts}</>;
}

      <Card style={{ marginTop: 24, textAlign: "center" }} highlight>
        <p style={{ color: COLORS.slateLight, fontSize: 14, lineHeight: 1.7, margin: 0 }}>{CONTENT.meta.disclaimer}</p>
      </Card>
    </div>
  );
}

// ─── Main App ───

const SECTION_COMPONENTS = {
  home: HomeSection,
  foundations: FoundationsSection,
  statutes: StatutesSection,
  programs: ProgramsSection,
  far19: FAR19Section,
  history: HistorySection,
  resources: ResourcesSection,
};
function App() {
  const [section, setSection] = useState("home");
  const mainRef = useRef(null);

  const handleNav = (id) => {
    setSection(id);
    if (mainRef.current) mainRef.current.scrollTo({ top: 0, behavior: "smooth" });
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const SectionComponent = SECTION_COMPONENTS[section] || HomeSection;

  return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(180deg, ${COLORS.navy} 0%, #0D1F3C 50%, ${COLORS.navy} 100%)`, fontFamily: "'Source Sans 3', 'Source Sans Pro', system-ui, sans-serif", color: COLORS.slateLight }}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
      <NavBar sections={CONTENT.sections} active={section} onNav={handleNav} />
      <main ref={mainRef} style={{ maxWidth: 900, margin: "0 auto", padding: "88px 24px 60px" }}>
        <SectionComponent onNav={handleNav} />
      </main>
      <footer style={{ textAlign: "center", padding: "32px 24px", borderTop: `1px solid ${COLORS.cardBorder}`, color: COLORS.slate, fontSize: 13 }}>
        <div>{CONTENT.meta.footerLine1}</div>
        <div style={{ marginTop: 4, fontSize: 12 }}>{CONTENT.meta.footerLine2}</div>
      </footer>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
