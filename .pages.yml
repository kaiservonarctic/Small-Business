media: media

content:
  # ─── Site Metadata ───
  - name: meta
    label: Site Settings
    type: file
    path: src/_data/meta.json
    fields:
      - name: siteTitle
        label: Site Title
        type: string
      - name: lastUpdated
        label: Last Updated
        type: string
      - name: disclaimer
        label: Disclaimer
        type: text
      - name: footerLine1
        label: Footer Line 1
        type: string
      - name: footerLine2
        label: Footer Line 2
        type: string

  # ─── Navigation ───
  - name: sections
    label: Navigation
    type: file
    path: src/_data/sections.json
    fields:
      - name: id
        label: ID (used in URL hash)
        type: string
      - name: label
        label: Display Label
        type: string

  # ─── Home Page ───
  - name: home
    label: Home Page
    type: file
    path: src/_data/home.json
    fields:
      - name: badgeText
        label: Badge Text
        type: string
      - name: headline
        label: Headline
        type: string
      - name: subtitle
        label: Subtitle
        type: text
      - name: updateNote
        label: Update Note
        type: text
      - name: stats
        label: Stats
        list: true
        fields:
          - name: number
            label: Number
            type: string
          - name: label
            label: Label
            type: string
          - name: sublabel
            label: Sub-label
            type: string

  # ─── Foundations ───
  - name: foundations
    label: Foundations
    type: file
    path: src/_data/foundations.json
    fields:
      - name: heading
        label: Section Heading
        type: string
      - name: subtitle
        label: Section Subtitle
        type: text
      - name: intro
        label: Introduction
        fields:
          - name: title
            label: Intro Title
            type: string
          - name: body
            label: Intro Body
            type: text
      - name: topics
        label: Topics
        list: true
        fields:
          - name: title
            label: Topic Title
            type: string
          - name: paragraphs
            label: Paragraphs
            type: string
            list: true
          - name: thresholds
            label: Thresholds (for threshold topics only)
            list: true
            fields:
              - name: label
                label: Threshold Name
                type: string
              - name: value
                label: Threshold Value
                type: string

  # ─── Statutes & Regulations ───
  - name: statutes
    label: Statutes & Regs
    type: file
    path: src/_data/statutes.json
    fields:
      - name: heading
        label: Section Heading
        type: string
      - name: subtitle
        label: Section Subtitle
        type: text
      - name: intro
        label: Introduction
        fields:
          - name: title
            label: Intro Title
            type: string
          - name: body
            label: Intro Body
            type: text
      - name: topics
        label: Topics
        list: true
        fields:
          - name: title
            label: Topic Title
            type: string
          - name: paragraphs
            label: Paragraphs
            type: string
            list: true

  # ─── SBA Programs ───
  - name: programs
    label: SBA Programs
    type: file
    path: src/_data/programs.json
    fields:
      - name: heading
        label: Section Heading
        type: string
      - name: subtitle
        label: Section Subtitle
        type: text
      - name: items
        label: Programs
        list: true
        fields:
          - name: name
            label: Program Name
            type: string
          - name: statute
            label: Statute
            type: string
          - name: regs
            label: Regulations
            type: string
          - name: status
            label: Status Label
            type: string
          - name: statusColor
            label: Status Color
            type: select
            options:
              - label: Red
                value: red
              - label: Green
                value: green
              - label: Yellow
                value: yellow
          - name: description
            label: Description
            type: text
          - name: current
            label: Current Status
            type: text

  # ─── FAR Provisions ───
  - name: far19
    label: FAR Provisions
    type: file
    path: src/_data/far19.json
    fields:
      - name: heading
        label: Section Heading
        type: string
      - name: subtitle
        label: Section Subtitle
        type: text
      - name: alert
        label: Alert Box
        fields:
          - name: title
            label: Alert Title
            type: string
          - name: body
            label: Alert Body
            type: text
      - name: highlights
        label: Highlights
        list: true
        fields:
          - name: title
            label: Title
            type: string
          - name: body
            label: Body
            type: text
      - name: details
        label: Detail Sections
        list: true
        fields:
          - name: title
            label: Title
            type: string
          - name: paragraphs
            label: Paragraphs
            type: string
            list: true

  # ─── History ───
  - name: history
    label: History
    type: file
    path: src/_data/history.json
    fields:
      - name: heading
        label: Section Heading
        type: string
      - name: subtitle
        label: Section Subtitle
        type: text
      - name: timeline
        label: Timeline Events
        list: true
        fields:
          - name: date
            label: Date
            type: string
          - name: event
            label: Event Description
            type: text
          - name: badge
            label: Badge Label
            type: string
          - name: color
            label: Color
            type: select
            options:
              - label: Blue
                value: blue
              - label: Red
                value: red
              - label: Yellow
                value: yellow
              - label: Green
                value: green
      - name: topics
        label: History Topics
        list: true
        fields:
          - name: title
            label: Topic Title
            type: string
          - name: paragraphs
            label: Paragraphs
            type: string
            list: true

  # ─── Resources ───
  - name: resources
    label: Resources
    type: file
    path: src/_data/resources.json
    fields:
      - name: heading
        label: Section Heading
        type: string
      - name: subtitle
        label: Section Subtitle
        type: text
      - name: categories
        label: Resource Categories
        list: true
        fields:
          - name: name
            label: Category Name
            type: string
          - name: links
            label: Links
            list: true
            fields:
              - name: name
                label: Link Name
                type: string
              - name: desc
                label: Description
                type: string
              - name: url
                label: URL
                type: string
